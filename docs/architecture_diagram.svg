<svg viewBox="0 0 960 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">ArchGuard — Multi-Agent Architecture Governance Review</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748b">Google ADK  ·  MCP Server  ·  Security Guardrail  ·  Domain-Tagged Findings</text>

  <!-- Design Doc input -->
  <rect x="380" y="80" width="200" height="46" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-size="14" fill="#334155">📄 Design Doc (.md)</text>
  <line x1="480" y1="126" x2="480" y2="152" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <rect x="300" y="152" width="360" height="56" rx="10" fill="#3b82f6"/>
  <text x="480" y="176" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Orchestrator Agent</text>
  <text x="480" y="196" text-anchor="middle" font-size="11.5" fill="#dbeafe">Google ADK SequentialAgent · compute_score()</text>

  <!-- Fan-out lines -->
  <line x1="480" y1="208" x2="170" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="208" x2="480" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="208" x2="790" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Risk Agent -->
  <rect x="30" y="250" width="280" height="100" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">🔴 Risk Agent</text>
  <text x="170" y="296" text-anchor="middle" font-size="11" fill="#78350f">Security · Integration</text>
  <text x="170" y="312" text-anchor="middle" font-size="11" fill="#78350f">Ops · Data risk assessment</text>
  <text x="170" y="332" text-anchor="middle" font-size="10.5" fill="#b45309">→ severity + domain tag</text>

  <!-- Compliance Agent -->
  <rect x="340" y="250" width="280" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">📋 Compliance Agent</text>
  <text x="480" y="296" text-anchor="middle" font-size="11" fill="#1e3a8a">Checks live governance</text>
  <text x="480" y="312" text-anchor="middle" font-size="11" fill="#1e3a8a">checklists via MCP tool calls</text>
  <text x="480" y="332" text-anchor="middle" font-size="10.5" fill="#2563eb">→ MET / NOT_MET / UNCLEAR</text>

  <!-- Clarification Agent -->
  <rect x="650" y="250" width="280" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="790" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">❓ Clarification Agent</text>
  <text x="790" y="296" text-anchor="middle" font-size="11" fill="#14532d">Flags gaps blocking a safe</text>
  <text x="790" y="312" text-anchor="middle" font-size="11" fill="#14532d">go / no-go decision</text>
  <text x="790" y="332" text-anchor="middle" font-size="10.5" fill="#16a34a">→ prioritized questions</text>

  <!-- MCP Policy Server connector -->
  <line x1="480" y1="350" x2="480" y2="384" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="340" y="386" width="280" height="52" rx="8" fill="#1e3a8a"/>
  <text x="480" y="408" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">🔌 MCP Policy Server</text>
  <text x="480" y="424" text-anchor="middle" font-size="10" fill="#bfdbfe">get_checklist() → {text, domain} · stdio</text>

  <!-- Converge down to guardrail -->
  <line x1="170" y1="350" x2="300" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="438" x2="480" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="350" x2="660" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Guardrail -->
  <rect x="140" y="472" width="680" height="76" rx="10" fill="#ef4444"/>
  <text x="480" y="500" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">🔒 Security Guardrail — No Autonomous Approval</text>
  <text x="480" y="520" text-anchor="middle" font-size="11.5" fill="#fecaca">Overrides any READY verdict lacking explicit human_sign_off</text>
  <text x="480" y="538" text-anchor="middle" font-size="11.5" fill="#fecaca">Every decision + tool call logged to an append-only audit trail</text>

  <line x1="480" y1="548" x2="480" y2="574" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- domain_utils layer -->
  <rect x="140" y="576" width="680" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="600" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">agents/domain_utils.py — 6-Domain Governance Taxonomy</text>
  <text x="480" y="618" text-anchor="middle" font-size="10.5" fill="#475569">group_by_domain · build_heatmap_matrix · next_action · green_path</text>

  <!-- Split to outputs -->
  <line x1="480" y1="640" x2="290" y2="672" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="640" x2="670" y2="672" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CLI output -->
  <rect x="120" y="674" width="340" height="94" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="290" y="698" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">⌨️ CLI — main.py</text>
  <text x="290" y="717" text-anchor="middle" font-size="10.5" fill="#475569">Domain-grouped blockers · Green Path</text>
  <text x="290" y="733" text-anchor="middle" font-size="10.5" fill="#475569">→ Action lines per blocker</text>
  <text x="290" y="753" text-anchor="middle" font-size="10.5" fill="#475569">Plain-English governance summary</text>

  <!-- Streamlit output -->
  <rect x="500" y="674" width="340" height="94" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="670" y="698" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">🖥️ Streamlit UI — app.py</text>
  <text x="670" y="717" text-anchor="middle" font-size="10.5" fill="#475569">Risk heatmap · Green Path expander</text>
  <text x="670" y="733" text-anchor="middle" font-size="10.5" fill="#475569">What-to-Fix-First + next actions</text>
  <text x="670" y="753" text-anchor="middle" font-size="10.5" fill="#475569">JSON / Markdown report download</text>
</svg>
